<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kunal's .NET + AI Roadmap Tracker</title>
<style>
  :root{
    --bg:#0f1115; --card:#171a21; --border:#262b36; --text:#e6e8ec; --muted:#9aa3b2;
    --accent:#5b8def; --accent2:#22c55e; --warn:#f59e0b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); line-height:1.5;
  }
  header{
    padding:28px 20px 18px; text-align:center; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:var(--bg); z-index:10;
  }
  header h1{margin:0 0 6px; font-size:22px;}
  header p{margin:0; color:var(--muted); font-size:14px;}
  .overall-bar-wrap{max-width:600px; margin:14px auto 0;}
  .container{max-width:900px; margin:0 auto; padding:24px 16px 80px;}
  .phase{
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    margin-bottom:20px; overflow:hidden;
  }
  .phase-head{
    padding:16px 18px; cursor:pointer; display:flex; justify-content:space-between;
    align-items:center; gap:12px; user-select:none;
  }
  .phase-head:hover{background:#1b1f29;}
  .phase-title{font-size:16px; font-weight:600;}
  .phase-sub{color:var(--muted); font-size:12.5px; margin-top:2px;}
  .chevron{transition:transform .2s; color:var(--muted); font-size:14px;}
  .phase.open .chevron{transform:rotate(90deg);}
  .phase-body{display:none; padding:0 18px 18px;}
  .phase.open .phase-body{display:block;}
  .bar-track{
    background:#262b36; border-radius:6px; height:8px; overflow:hidden; flex:1;
  }
  .bar-fill{
    height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2));
    width:0%; transition:width .3s;
  }
  .bar-row{display:flex; align-items:center; gap:10px; margin-top:6px;}
  .bar-pct{font-size:12px; color:var(--muted); min-width:34px; text-align:right;}
  .step{
    border-top:1px solid var(--border); padding:12px 0;
  }
  .step:first-child{border-top:none;}
  .step label.item{
    display:flex; align-items:flex-start; gap:10px; cursor:pointer; margin:6px 0;
    font-size:14.5px;
  }
  .step label.item input{margin-top:3px; width:16px; height:16px; accent-color:var(--accent2); cursor:pointer; flex-shrink:0;}
  .step-title{font-weight:600; font-size:14.5px; margin-bottom:6px;}
  .res{color:var(--muted); font-size:13px; margin:4px 0 10px 26px;}
  .res a{color:var(--accent); text-decoration:none;}
  .res a:hover{text-decoration:underline;}
  .tag{
    display:inline-block; font-size:10.5px; padding:1px 6px; border-radius:4px;
    margin-left:6px; vertical-align:middle;
  }
  .tag.free{background:#14321f; color:#4ade80;}
  .tag.owned{background:#1e2f4d; color:#7db3ff;}
  .tag.udemy{background:#3a2a12; color:#f5a524;}
  textarea{
    width:100%; min-height:60px; background:#0f1115; border:1px solid var(--border);
    border-radius:8px; color:var(--text); padding:8px 10px; font-size:13px;
    font-family:inherit; resize:vertical; margin-top:6px;
  }
  .notes-label{font-size:12px; color:var(--muted); margin-top:14px; display:block;}
  .exitbar{
    margin-top:14px; padding:12px 14px; background:#151a10; border:1px solid #2e3a1a;
    border-radius:8px;
  }
  .exitbar-title{font-size:12.5px; font-weight:600; color:var(--warn); margin-bottom:8px;}
  .dsa-grid{display:grid; grid-template-columns:1fr; gap:6px;}
  .dsa-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:8px 10px; background:#0f1115; border:1px solid var(--border); border-radius:8px;
  }
  .dsa-row label{display:flex; align-items:center; gap:10px; font-size:13.5px; cursor:pointer;}
  .dsa-row input{width:16px; height:16px; accent-color:var(--accent2); cursor:pointer;}
  .dsa-row a{color:var(--accent); font-size:12px; text-decoration:none; white-space:nowrap;}
  .dsa-row a:hover{text-decoration:underline;}
  .footer-note{text-align:center; color:var(--muted); font-size:12px; margin-top:10px;}
  .reset-btn{
    background:none; border:1px solid var(--border); color:var(--muted); font-size:11px;
    padding:4px 10px; border-radius:6px; cursor:pointer; margin-top:16px;
  }
  .reset-btn:hover{border-color:#b91c1c; color:#f87171;}
  .savepill{
    position:fixed; bottom:16px; right:16px; background:var(--accent2); color:#04150a;
    font-size:12px; font-weight:600; padding:7px 14px; border-radius:20px;
    opacity:0; transition:opacity .3s; pointer-events:none;
  }
  .savepill.show{opacity:1;}
</style>
</head>
<body>

  <h1>🧭 Kunal's Full-Stack .NET + AI Roadmap</h1>

    <div class="bar-row">

      <div class="bar-pct" id="overall-pct">0%</div>
    </div>
  </div>
</header>

<div class="container" id="app"></div>

<div class="savepill" id="savepill">Saved ✓</div>

/* ---------- STORAGE ---------- */
const STORE_KEY = "kunal_roadmap_v1";
function loadState(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }catch(e){ return {}; }
}
function saveState(state){
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
  const pill = document.getElementById('savepill');
  pill.classList.add('show');
  clearTimeout(window._pillTimer);
  window._pillTimer = setTimeout(()=>pill.classList.remove('show'), 900);
}
let state = loadState();

/* ---------- RENDER ---------- */
const app = document.getElementById('app');

function countItems(phase){
  let total=0, done=0;
  if(phase.isDsa){
    phase.dsaTopics.forEach((t,i)=>{
      total++; if(state['dsa-'+i]) done++;
    });
  } else {
    phase.steps.forEach(step=>{
      step.items.forEach(it=>{
        total++; if(state[it.id]) done++;
      });
    });
  }
  return {total, done};
}

function renderPhase(phase){
  const {total, done} = countItems(phase);
  const pct = total ? Math.round(done/total*100) : 0;

  const div = document.createElement('div');
  div.className = 'phase';
  div.id = 'card-'+phase.id;

  const head = document.createElement('div');
  head.className = 'phase-head';
  head.innerHTML = `
    <div style="flex:1">
      <div class="phase-title">${phase.title}</div>
      <div class="phase-sub">${phase.sub}</div>
      <div class="bar-row">
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="bar-pct">${pct}%</div>
      </div>
    </div>
    <div class="chevron">▶</div>
  `;
  head.onclick = () => { div.classList.toggle('open'); };
  div.appendChild(head);

  const body = document.createElement('div');
  body.className = 'phase-body';

  if(phase.resource){
    const r = document.createElement('div');
    r.className = 'res';
    r.style.margin = '4px 0 14px 0';
    r.innerHTML = phase.resource;
    body.appendChild(r);
  }

  if(phase.isDsa){
    const grid = document.createElement('div');
    grid.className = 'dsa-grid';
    phase.dsaTopics.forEach((topic,i)=>{
      const row = document.createElement('div');
      row.className = 'dsa-row';
      const key = 'dsa-'+i;
      row.innerHTML = `
        <label>
          <input type="checkbox" ${state[key]?'checked':''} data-key="${key}">
          <span>${topic}</span>
        </label>
        <a href="https://namastedev.com/namaste-dsa-sheet" target="_blank">Open sheet →</a>
      `;
      grid.appendChild(row);
    });
    body.appendChild(grid);
    const note = document.createElement('div');
    note.className = 'footer-note';
    note.style.textAlign='left';
    note.style.marginTop='10px';
    note.innerHTML = 'Method per problem: attempt 20 min → study optimal → re-solve from memory 2 days later. ~3–5 problems/week.';
    body.appendChild(note);
  } else {
    phase.steps.forEach(step=>{
      const s = document.createElement('div');
      s.className = 'step';
      const stitle = document.createElement('div');
      stitle.className = 'step-title';
      stitle.textContent = step.title;
      s.appendChild(stitle);

      step.items.forEach(it=>{
        const label = document.createElement('label');
        label.className = 'item';
        label.innerHTML = `<input type="checkbox" ${state[it.id]?'checked':''} data-key="${it.id}"><span>${it.text}</span>`;
        s.appendChild(label);
      });

      if(step.res){
        const r = document.createElement('div');
        r.className = 'res';
        r.innerHTML = step.res;
        s.appendChild(r);
      }
      body.appendChild(s);
    });
  }

  if(phase.capstone){
    const cs = document.createElement('div');
    cs.className = 'step';
    const key = phase.id+'-capstone';
    cs.innerHTML = `
      <div class="step-title">🏗 Capstone slice</div>
      <label class="item"><input type="checkbox" ${state[key]?'checked':''} data-key="${key}"><span>${phase.capstone}</span></label>
    `;
    body.appendChild(cs);
  }

  if(phase.exitbar){
    const eb = document.createElement('div');
    eb.className = 'exitbar';
    eb.innerHTML = `<div class="exitbar-title">✅ EXIT BAR — must pass all before moving on</div>`;
    phase.exitbar.forEach((text,i)=>{
      const key = phase.id+'-exit-'+i;
      const label = document.createElement('label');
      label.className = 'item';
      label.innerHTML = `<input type="checkbox" ${state[key]?'checked':''} data-key="${key}"><span>${text}</span>`;
      eb.appendChild(label);
    });
    body.appendChild(eb);
  }

  const notesKey = phase.id+'-notes';
  const notesLabel = document.createElement('label');
  notesLabel.className = 'notes-label';
  notesLabel.textContent = '📝 Notes / doubts for this phase';
  body.appendChild(notesLabel);
  const textarea = document.createElement('textarea');
  textarea.dataset.key = notesKey;
  textarea.value = state[notesKey] || '';
  textarea.placeholder = 'What clicked, what\'s still shaky, questions to bring to the coach...';
  textarea.oninput = () => { state[notesKey] = textarea.value; saveState(state); };
  body.appendChild(textarea);

  div.appendChild(body);
  return div;
}

function renderAll(){
  app.innerHTML = '';
  DATA.forEach(phase => app.appendChild(renderPhase(phase)));
  // open phase0 by default first time
  if(!localStorage.getItem(STORE_KEY)){
    document.getElementById('card-phase0').classList.add('open');
  }
  attachHandlers();
  updateOverall();
}

function attachHandlers(){
  document.querySelectorAll('input[type=checkbox][data-key]').forEach(cb=>{
    cb.addEventListener('change', ()=>{
      state[cb.dataset.key] = cb.checked;
      saveState(state);
      updateOverall();
      refreshPhaseBar(cb);
    });
  });
}

function refreshPhaseBar(cb){
  const card = cb.closest('.phase');
  const phaseId = card.id.replace('card-','');
  const phase = DATA.find(p=>p.id===phaseId);
  const {total, done} = countItems(phase);
  const pct = total ? Math.round(done/total*100) : 0;
  const fill = card.querySelector('.phase-head .bar-fill');
  const pctEl = card.querySelector('.phase-head .bar-pct');
  fill.style.width = pct+'%';
  pctEl.textContent = pct+'%';
}

function updateOverall(){
  let total=0, done=0;
  DATA.forEach(phase=>{
    const c = countItems(phase);
    total += c.total; done += c.done;
  });
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('overall-fill').style.width = pct+'%';
  document.getElementById('overall-pct').textContent = pct+'%';
}

renderAll();
</script>

</body>
</html>
